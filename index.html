<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="robots" content="noindex, nofollow" />

        <title>Figure di Sicurezza</title>

        <!-- PWA Manifest -->
        <link rel="manifest" href="./manifest.json" />

        <!--
            theme-color con media query: si aggiorna automaticamente in base
            al tema di sistema. Quando l'utente cambia tema manualmente via JS,
            il tag "id=themeColorMeta" viene aggiornato programmaticamente.
            Questo colora la gesture bar su Android e la status bar su iOS.
        -->
        <meta id="themeColorMeta" name="theme-color" content="#f3f5f3" />
        <meta
            name="theme-color"
            content="#f3f5f3"
            media="(prefers-color-scheme: light)"
        />
        <meta
            name="theme-color"
            content="#04140d"
            media="(prefers-color-scheme: dark)"
        />

        <!-- PWA iOS -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <!--
            black-translucent: la status bar iOS diventa trasparente e il
            contenuto scorre sotto di essa — il massimo ottenibile su Safari PWA.
            La gesture bar sul fondo non può essere nascosta su iOS.
        -->
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Figure di Sicurezza" />

        <!-- Icone -->
        <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
        <link
            rel="apple-touch-icon"
            sizes="152x152"
            href="./assets/icons/icon-192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="167x167"
            href="./assets/icons/icon-192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="./assets/icons/icon-192.png"
        />
        <link rel="icon" type="image/png" href="./assets/img/logo.png" />

        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />

        <!-- Google Fonts – Rubik -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
            rel="stylesheet"
        />
        <!-- Analytics -->
        <script
            async
            src="https://www.googletagmanager.com/gtag/js?id=G-3MCJ10R94P"
        ></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());

            gtag("config", "G-3MCJ10R94P");
        </script>

        <!-- Stile applicazione -->
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <!-- Banner connessione offline/online -->
        <div id="offlineBanner" class="offline-banner hidden">
            <i class="fa-solid fa-plug-circle-xmark"></i>
            <span
                >Connessione non disponibile. I dati potrebbero non essere
                aggiornati.</span
            >
        </div>

        <!-- Header -->
        <header class="header container">
            <div class="header-inner">
                <h1>
                    <div class="logo-wrapper">
                        <img
                            class="logo"
                            src="./assets/img/logo.png"
                            alt="Logo"
                        />
                        <div class="version"></div>
                    </div>
                    Figure di Sicurezza
                </h1>
                <button
                    id="themeToggle"
                    class="theme-toggle"
                    aria-label="Cambia tema"
                >
                    <i class="fa-solid fa-moon"></i>
                </button>

                <!-- Bottone Installa -->
                <!-- <button
                    id="installButton"
                    class="install-btn"
                    style="display: none"
                >
                    <i class="fa-solid fa-download"></i>
                    <span>Installa App</span>
                </button> -->
            </div>
        </header>

        <!-- Contenuto principale -->
        <main class="main container">
            <div class="main-content">
                <!-- Breadcrumb di navigazione gerarchica -->
                <div
                    id="breadcrumbContainer"
                    class="breadcrumb-container"
                ></div>

                <!-- Barra di ricerca + filtri/città -->
                <div id="searchWrapper" class="search-wrapper">
                    <div class="search-box">
                        <i class="fa-solid fa-search" aria-hidden="true"></i>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Cerca per città, gruppo, incarico o nome"
                            autocomplete="off"
                        />
                        <button
                            id="clearBtn"
                            class="hidden"
                            aria-label="Cancella ricerca"
                        >
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </div>
                    <!-- Filtri contestuali: pill città (vista Gruppi) o pill filtri (Incarichi/Militari) -->
                    <div
                        id="cityFilterContainer"
                        class="city-filter hidden"
                    ></div>
                </div>

                <!-- Messaggio nessun risultato -->
                <div id="noResults" class="no-results hidden">
                    <i class="fa-solid fa-search" aria-hidden="true"></i>
                    <p>Nessun risultato trovato</p>
                </div>

                <!-- Area di rendering delle viste -->
                <div id="content" class="view-container"></div>
            </div>
        </main>

        <!-- Footer – Navigazione bottom bar -->
        <footer>
            <nav
                class="bottom-nav"
                role="navigation"
                aria-label="Navigazione principale"
            >
                <div
                    class="nav-item active"
                    data-view="cities"
                    role="button"
                    tabindex="0"
                >
                    <i class="fa-solid fa-city" aria-hidden="true"></i>
                    <span>Città</span>
                </div>
                <div
                    class="nav-item"
                    data-view="groups"
                    role="button"
                    tabindex="0"
                >
                    <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
                    <span>Gruppi</span>
                </div>
                <div
                    class="nav-item"
                    data-view="roles"
                    role="button"
                    tabindex="0"
                >
                    <i class="fa-solid fa-briefcase" aria-hidden="true"></i>
                    <span>Incarichi</span>
                </div>
                <div
                    class="nav-item"
                    data-view="people"
                    role="button"
                    tabindex="0"
                >
                    <i class="fa-solid fa-user" aria-hidden="true"></i>
                    <span>Militari</span>
                </div>
            </nav>
        </footer>

        <!-- Modale dettaglio militare -->
        <div
            id="personModal"
            class="modal-overlay hidden"
            role="dialog"
            aria-modal="true"
            aria-label="Dettaglio militare"
        >
            <div class="modal-content">
                <button class="modal-close" id="modalClose" aria-label="Chiudi">
                    <i class="fa-solid fa-times"></i>
                </button>
                <div id="modalBody"></div>
            </div>
        </div>

        <!-- Script principale (moduli caricati in ordine) -->
        <script src="./js/config.js"></script>
        <script src="./js/g-analytics.js"></script>
        <script src="./js/state.js"></script>
        <script src="./js/utils.js"></script>
        <script src="./js/theme.js"></script>
        <script src="./js/filters.js"></script>
        <script src="./js/search.js"></script>
        <script src="./js/modal.js"></script>
        <script src="./js/render.js"></script>
        <script src="./js/views/cities.js"></script>
        <script src="./js/views/groups.js"></script>
        <script src="./js/views/roles.js"></script>
        <script src="./js/views/people.js"></script>
        <script src="./js/navigation.js"></script>
        <script src="./js/connectivity.js"></script>
        <script src="./js/service-worker-manager.js"></script>
        <script src="./js/app.js"></script>
    </body>
</html>
